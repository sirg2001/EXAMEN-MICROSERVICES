# =========================================
# GitLab CI/CD Pipeline - MS-PAYMENTS
# =========================================

image: docker:latest

stages:
  - build
  - package
  - push

variables:
  REGISTRY: docker.io
  IMAGE_NAME: ${CI_REGISTRY_USER}/ms-payments
  IMAGE_TAG: ${CI_COMMIT_SHA:0:8}
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: 1

services:
  - docker:dind

# =========================================
# Stage 1: Build Maven Project
# =========================================
build:maven:
  stage: build
  image: maven:3.8.1-openjdk-11
  script:
    - echo "Building Maven project..."
    - mvn clean package -DskipTests
    - echo "Build completed successfully!"
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository/
  only:
    variables:
      - $CI_COMMIT_BRANCH =~ /^(main|develop)$/ || $CI_PIPELINE_SOURCE == "merge_request_event"

# =========================================
# Stage 2: Build Docker Image
# =========================================
package:docker:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  needs:
    - build:maven
  script:
    - echo "Building Docker image..."
    - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest
    - echo "Docker image built successfully!"
  only:
    variables:
      - $CI_COMMIT_BRANCH =~ /^(main|develop)$/

# =========================================
# Stage 3: Push to Docker Registry
# =========================================
push:registry:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  needs:
    - build:maven
    - package:docker
  script:
    - echo "Logging in to Docker Registry..."
    - echo ${CI_JOB_TOKEN} | docker login -u ${CI_REGISTRY_USER} --password-stdin ${REGISTRY} || true
    - echo "Pushing Docker image to registry..."
    - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}
    - docker push ${IMAGE_NAME}:latest
    - echo "Image pushed successfully!"
  only:
    variables:
      - $CI_COMMIT_BRANCH == "main"
  when: manual

