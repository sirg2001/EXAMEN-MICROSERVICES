# =============== SERVER ===============
server.port=8082
server.servlet.context-path=/api
spring.application.name=ms-bookings
spring.profiles.active=local

# =============== DATABASE ===============
spring.datasource.url=jdbc:mysql://localhost:3307/ms_bookings?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============== REDIS (Caching) ===============
spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# =============== KAFKA (Async Communication) ===============
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=ms-bookings-group
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# =============== SYNC COMMUNICATION (MS-Properties) ===============
ms.properties.url=http://localhost:8081/api

# =============== LOGGING ===============
logging.level.root=INFO
logging.level.com.realestate=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/ms-bookings.log

# =============== ACTUATOR ===============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
