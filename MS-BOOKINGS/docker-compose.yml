# =========================================
# Docker Compose - MS-BOOKINGS
# Déploiement individuel du microservice
# =========================================
services:
  mysql-bookings:
    image: mysql:8.0
    container_name: mysql-bookings
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_bookings
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - mysql-bookings-data:/var/lib/mysql
    networks:
      - bookings-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4

  redis:
    image: redis:7-alpine
    container_name: redis-bookings
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookings-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-bookings
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions --bootstrap-server=kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - bookings-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper-bookings
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bookings-network

  ms-bookings:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-bookings
    environment:
      SPRING_APPLICATION_NAME: ms-bookings
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-bookings:3306/ms_bookings?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MS_PROPERTIES_URL: http://ms-properties:8081/api
    ports:
      - "8082:8082"
    depends_on:
      mysql-bookings:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bookings-network
    restart: unless-stopped

networks:
  bookings-network:
    driver: bridge

volumes:
  mysql-bookings-data:
